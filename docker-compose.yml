services:
  postgres:
    image: postgres:16-alpine
    container_name: zezet-postgres
    environment:
      POSTGRES_USER: zezet
      POSTGRES_PASSWORD: zezet
      POSTGRES_DB: zezet
    ports:
      - "5432:5432"
    volumes:
      - zezet_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zezet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zezet-redis
    ports:
      - "6379:6379"
    volumes:
      - zezet_redis:/data

volumes:
  zezet_pg:
  zezet_redis:
